<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dream Villa - The Dream House Model</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.1/dist/aframe-extras.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="info">
        🏡 The Dream House Model | 🖱️ Drag to look | WASD to move | 💧 Animated Pool
    </div>

    <a-scene background="color: #87CEEB" fog="type: linear; color: #87CEEB; far: 40; near: 20">
        <!-- Assets: local 3D model -->
        <a-assets>
            <a-asset-item id="dreamHouse" src="assets/models/the_dream_house.glb"></a-asset-item>
        </a-assets>

        <!-- Camera with movement -->
        <a-entity id="cameraRig" position="0 1.6 5" movement-controls="speed: 1.2; fly: false" wasd-controls look-controls>
            <a-camera></a-camera>
        </a-entity>

        <!-- Lighting -->
        <a-light type="ambient" color="#404060" intensity="0.7"></a-light>
        <a-light type="directional" position="5 10 3" intensity="1.2" cast-shadow="true" shadow-map-size="1024" color="#FFF5E0"></a-light>
        <a-light type="point" position="2 2 0" intensity="0.5" color="#FFAA66" distance="12"></a-light>

        <!-- Ground -->
        <a-plane rotation="-90 0 0" width="60" height="60" position="0 -0.05 0"
                 material="color: #7CB518; roughness: 0.8; metalness: 0.1; repeat: 8 8"
                 receive-shadow="true"></a-plane>

        <!-- Base platform -->
        <a-box width="12" height="0.2" depth="12" position="0 -0.05 0" color="#E8E4D9" receive-shadow="true"></a-box>

        <!-- Imported dream house model -->
        <a-entity gltf-model="#dreamHouse" position="0 0 0" scale="1 1 1" shadow="receive" rotation="0 0 0"></a-entity>

        <!-- ========== ANIMATED SWIMMING POOL ========== -->
        <a-entity id="pool" position="4 0 -3.5">
            <a-box width="4.5" height="0.2" depth="3.0" position="0 -0.1 0" color="#7AA5C2" receive-shadow="true"></a-box>
            <a-plane id="waterPlane" width="4.3" height="2.8" position="0 0.05 0" rotation="-90 0 0"
                     material="color: #3F8BBF; opacity: 0.85; metalness: 0.9; roughness: 0.2; emissive: #1A5F8A; emissiveIntensity: 0.2"></a-plane>
            <a-box width="4.7" height="0.1" depth="0.3" position="0 0.1 -1.55" color="#D9D2B0"></a-box>
            <a-box width="4.7" height="0.1" depth="0.3" position="0 0.1 1.55" color="#D9D2B0"></a-box>
            <a-box width="0.3" height="0.1" depth="3.2" position="2.35 0.1 0" color="#D9D2B0"></a-box>
            <a-box width="0.3" height="0.1" depth="3.2" position="-2.35 0.1 0" color="#D9D2B0"></a-box>
        </a-entity>
        <!-- Umbrella and lounger -->
        <a-entity position="5.8 -0.2 -2.2">
            <a-cylinder radius="0.08" height="1.5" color="#C9AD7A" position="0 0.75 0"></a-cylinder>
            <a-cone radius-bottom="0.8" radius-top="0.01" height="0.2" color="#F05454" position="0 1.55 0"></a-cone>
        </a-entity>
        <a-box width="0.6" height="0.2" depth="1.8" position="6.3 0.05 -2.5" color="#D6B37A" rotation="0 20 0"></a-box>

        <!-- Floating duck -->
        <a-entity position="5.2 0.2 -2.8">
            <a-sphere radius="0.18" color="#FFDD77"></a-sphere>
            <a-sphere radius="0.07" color="#000000" position="0.07 0.05 0.15"></a-sphere>
            <a-cone radius-bottom="0.1" radius-top="0.01" height="0.12" color="#FFAA33" position="-0.05 0.12 0.2" rotation="0 30 0"></a-cone>
            <a-animation attribute="position" dur="2000" from="5.2 0.2 -2.8" to="5.6 0.22 -3.0" repeat="indefinite" direction="alternate" easing="ease-in-out"></a-animation>
            <a-animation attribute="rotation" dur="5000" from="0 0 0" to="0 360 0" repeat="indefinite" easing="linear"></a-animation>
        </a-entity>

        <!-- Ceiling fan (decorative) -->
        <a-entity position="-1.5 3.1 1.2">
            <a-cylinder radius="0.8" height="0.1" color="#E0D6C0"></a-cylinder>
            <a-box width="1.4" height="0.05" depth="0.2" position="0.7 0 0" color="#B0A07A">
                <a-animation attribute="rotation" dur="4000" from="0 0 0" to="0 360 0" repeat="indefinite" easing="linear"></a-animation>
            </a-box>
            <a-box width="1.4" height="0.05" depth="0.2" position="-0.7 0 0" color="#B0A07A">
                <a-animation attribute="rotation" dur="4000" from="0 0 0" to="0 360 0" repeat="indefinite" easing="linear"></a-animation>
            </a-box>
        </a-entity>

        <!-- Trees -->
        <a-entity position="-7 0 -6"><a-cylinder radius="0.8" height="2.2" color="#8B5A2B" position="0 1.1 0"></a-cylinder><a-sphere radius="1.0" color="#3A7D34" position="0 2.2 0"></a-sphere><a-sphere radius="0.7" color="#5C9E4E" position="0 3.0 0"></a-sphere></a-entity>
        <a-entity position="-5 0 -7"><a-cylinder radius="0.7" height="2.0" color="#8B5A2B" position="0 1.0 0"></a-cylinder><a-sphere radius="0.9" color="#3A7D34" position="0 2.1 0"></a-sphere></a-entity>
        <a-entity position="8 0 -5"><a-cylinder radius="0.9" height="2.3" color="#8B5A2B" position="0 1.15 0"></a-cylinder><a-sphere radius="1.0" color="#3A7D34" position="0 2.3 0"></a-sphere></a-entity>
        <a-entity position="7 0 -8"><a-cylinder radius="0.6" height="1.8" color="#8B5A2B" position="0 0.9 0"></a-cylinder><a-sphere radius="0.8" color="#4C8B3C" position="0 1.9 0"></a-sphere></a-entity>
        <a-entity position="-6 0 7"><a-cylinder radius="0.8" height="2.0" color="#8B5A2B" position="0 1.0 0"></a-cylinder><a-sphere radius="0.9" color="#2E6B2F" position="0 2.0 0"></a-sphere></a-entity>
        <a-entity position="9 0 6"><a-cylinder radius="1.0" height="2.4" color="#7A481F" position="0 1.2 0"></a-cylinder><a-sphere radius="1.1" color="#468A3A" position="0 2.5 0"></a-sphere></a-entity>

        <!-- Car -->
        <a-entity position="-5 0.1 4.8" rotation="0 100 0">
            <a-box width="0.9" height="0.3" depth="1.8" color="#3A6EA5"></a-box>
            <a-box width="0.8" height="0.2" depth="0.9" position="0 0.25 0.4" color="#2F5480"></a-box>
            <a-sphere radius="0.2" position="-0.4 0.1 -0.8" color="#111111"></a-sphere>
            <a-sphere radius="0.2" position="0.4 0.1 -0.8" color="#111111"></a-sphere>
            <a-sphere radius="0.2" position="-0.4 0.1 0.8" color="#111111"></a-sphere>
            <a-sphere radius="0.2" position="0.4 0.1 0.8" color="#111111"></a-sphere>
        </a-entity>

        <!-- Dog -->
        <a-entity position="1 0.1 4.2" rotation="0 -30 0">
            <a-box width="0.4" height="0.4" depth="0.6" color="#B87C4F" position="0 0.2 0"></a-box>
            <a-sphere radius="0.18" color="#A86F42" position="0.3 0.25 0.15"></a-sphere>
            <a-sphere radius="0.07" color="#000" position="0.38 0.32 0.22"></a-sphere>
            <a-cylinder radius="0.05" height="0.3" color="#8B5A2B" position="-0.2 0.1 0.35" rotation="30 0 0"></a-cylinder>
            <a-animation attribute="position" dur="1500" from="1 0.1 4.2" to="1.2 0.12 4.3" repeat="indefinite" direction="alternate"></a-animation>
        </a-entity>

        <!-- Outdoor lights -->
        <a-entity position="-1.5 2.5 -2">
            <a-cylinder radius="0.06" height="0.08" color="#FFCC77" light="type: point; intensity: 0.4; distance: 2" position="-1 0 0">
                <a-animation attribute="material.emissiveIntensity" dur="1200" from="0.3" to="0.9" repeat="indefinite" direction="alternate"></a-animation>
            </a-cylinder>
            <a-cylinder radius="0.06" height="0.08" color="#FFCC77" light="type: point; intensity: 0.4; distance: 2" position="0 0 0">
                <a-animation attribute="material.emissiveIntensity" dur="1400" from="0.3" to="0.8" repeat="indefinite" direction="alternate"></a-animation>
            </a-cylinder>
            <a-cylinder radius="0.06" height="0.08" color="#FFCC77" light="type: point; intensity: 0.4; distance: 2" position="1 0 0">
                <a-animation attribute="material.emissiveIntensity" dur="1000" from="0.4" to="1.0" repeat="indefinite" direction="alternate"></a-animation>
            </a-cylinder>
        </a-entity>

        <!-- Water ripple script -->
        <script>
            AFRAME.registerComponent('water-ripple', {
                init: function() {
                    this.time = 0;
                    this.originalY = this.el.getAttribute('position').y;
                },
                tick: function(t, dt) {
                    this.time += dt / 1000;
                    const newY = this.originalY + Math.sin(this.time * 3) * 0.008;
                    this.el.setAttribute('position', {x: 0, y: newY, z: 0});
                }
            });
            document.querySelector('#waterPlane').setAttribute('water-ripple', '');
        </script>
    </a-scene>
</body>
</html>
